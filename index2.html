<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת מיזוג נתונים פיננסיים | Dr. Shay Tsaban</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #d1d5db 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full glass-panel rounded-3xl shadow-2xl overflow-hidden">
        
        <div class="bg-slate-900 p-10 text-white text-center relative">
            <h1 class="text-3xl font-extrabold tracking-tight">Financial Data Merge</h1>
            <p class="text-blue-400 text-sm mt-2 uppercase tracking-widest font-semibold">Yahoo Finance & Google Fallback System</p>
            <div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-transparent opacity-30"></div>
        </div>

        <form id="mergeForm" class="p-8 space-y-6">
            
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">סימולי מניות (מופרדים בפסיק)</label>
                <input type="text" id="tickers" placeholder="למשל: TSLA, AAPL, NVDA, MSFT" required
                    class="w-full px-5 py-4 border-2 border-slate-100 rounded-2xl focus:border-blue-600 focus:ring-0 outline-none transition-all bg-slate-50 font-semibold text-lg">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">תאריך התחלה</label>
                    <input type="date" id="startDate" required
                        class="w-full px-5 py-4 border-2 border-slate-100 rounded-2xl focus:border-blue-600 outline-none bg-slate-50">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">תאריך סיום</label>
                    <input type="date" id="endDate" required
                        class="w-full px-5 py-4 border-2 border-slate-100 rounded-2xl focus:border-blue-600 outline-none bg-slate-50">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">תדירות דגימה</label>
                <select id="frequency" class="w-full px-5 py-4 border-2 border-slate-100 rounded-2xl focus:border-blue-600 outline-none bg-slate-50 cursor-pointer appearance-none">
                    <option value="1d">יומי (Daily)</option>
                    <option value="1wk">שבועי (Weekly)</option>
                    <option value="1mo">חודשי (Monthly)</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-800 hover:bg-blue-900 text-white font-bold py-5 rounded-2xl shadow-lg transition-all transform hover:-translate-y-1 active:scale-[0.98] flex items-center justify-center">
                <span id="btnText">בצע איחוד וצור גיליון</span>
            </button>
        </form>

        <div id="resultArea" class="hidden p-8 border-t border-slate-100 bg-green-50 text-center animate-fade-in">
            <div class="flex items-center justify-center mb-4 text-green-700 font-bold">
                <svg class="w-6 h-6 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
                העיבוד הושלם בהצלחה!
            </div>
            <a id="sheetLink" href="#" target="_blank" class="block w-full bg-slate-900 hover:bg-black text-white font-bold py-5 rounded-2xl shadow-xl transition-all transform hover:scale-[1.01]">
                פתח את הגיליון ב-Google Sheets
            </a>
            <p class="text-xs text-slate-400 mt-4 italic">הגיליון נוצר ב-Drive שלך ושותף לצפייה לכל מי שיש לו את הקישור.</p>
        </div>
    </div>

    <script>
        // ה-URL החדש והמעודכן שסיפקת
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz0u65QNAANlMM_s_PULNA_PxMhNDLJOcYHoVE3In0DHIwSJ7RXlaoxV6mHDKGgvM1LFA/exec';

        const form = document.getElementById('mergeForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const resultArea = document.getElementById('resultArea');
        const sheetLink = document.getElementById('sheetLink');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // הכנת נתונים
            const tickersRaw = document.getElementById('tickers').value;
            const tickersArray = tickersRaw.split(',').map(s => s.trim()).filter(s => s.length > 0);
            
            const payload = {
                tickers: tickersArray,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            // מצב טעינה
            submitBtn.disabled = true;
            btnText.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                מעבד נתונים בשרת...
            `;
            resultArea.classList.add('hidden');

            try {
                // שליחה ל-Apps Script
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.status === "success") {
                    sheetLink.href = data.sheetUrl;
                    resultArea.classList.remove('hidden');
                    // גלילה חלקה לתוצאה
                    resultArea.scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("שגיאת שרת: " + data.message);
                }

            } catch (error) {
                console.error("Error:", error);
                alert("חלה שגיאה בתקשורת עם השרת. וודא שהסקריפט מפורסם כ-Web App ושהרשאות הגישה מוגדרות ל-Anyone.");
            } finally {
                submitBtn.disabled = false;
                btnText.innerText = "בצע איחוד וצור גיליון";
            }
        });
    </script>
</body>
</html>
