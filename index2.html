<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת מיזוג נתונים פיננסיים | Dr. Shay Tsaban</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background: radial-gradient(circle at top right, #f8fafc, #cbd5e1);
        }
        .main-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }
        .loading-shimmer {
            background: linear-gradient(90deg, #1e40af 0%, #3b82f6 50%, #1e40af 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer {
            from { background-position: 200% 0; }
            to { background-position: -200% 0; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-slate-800">

    <div class="max-w-2xl w-full main-card rounded-3xl overflow-hidden border border-white">
        
        <div class="bg-slate-900 p-10 text-white relative">
            <div class="flex justify-between items-center relative z-10">
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight">Financial Data Merge</h1>
                    <p class="text-blue-400 text-sm mt-1 font-medium opacity-80">Robust Yahoo-Google Fallback System</p>
                </div>
                <div class="hidden sm:block">
                    <svg class="w-12 h-12 text-blue-500 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                </div>
            </div>
            <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 20px 20px;"></div>
        </div>

        <form id="dataForm" class="p-8 space-y-6">
            
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-2 mr-1">סימולי מניות (לדוגמה: AAPL, TSLA, AMZN)</label>
                <input type="text" id="tickers" placeholder="הזן טיקרים מופרדים בפסיקים..." required
                    class="w-full px-5 py-4 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:ring-0 outline-none transition-all bg-slate-50/50 font-semibold text-lg">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2 mr-1">תאריך התחלה</label>
                    <input type="date" id="startDate" required
                        class="w-full px-5 py-4 border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none bg-slate-50/50">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2 mr-1">תאריך סיום</label>
                    <input type="date" id="endDate" required
                        class="w-full px-5 py-4 border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none bg-slate-50/50">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-600 mb-2 mr-1">תדירות דגימה</label>
                <select id="frequency" class="w-full px-5 py-4 border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none bg-slate-50/50 cursor-pointer appearance-none">
                    <option value="1d">יומי (Daily)</option>
                    <option value="1wk">שבועי (Weekly)</option>
                    <option value="1mo">חודשי (Monthly)</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-5 rounded-2xl shadow-xl transition-all transform hover:-translate-y-1 active:scale-[0.98] flex items-center justify-center overflow-hidden">
                <span id="btnText">אחזר ומזג נתונים</span>
            </button>
        </form>

        <div id="resultArea" class="hidden p-8 border-t border-slate-100 bg-blue-50/30 text-center">
            <div class="inline-flex items-center justify-center p-3 bg-green-100 rounded-full mb-4">
                <svg class="h-6 w-6 text-green-600" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                </svg>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-2">הקובץ מוכן!</h3>
            <p class="text-slate-500 text-sm mb-6">הנתונים אוחדו בהצלחה מכל המקורות הזמינים.</p>
            <a id="sheetLink" href="#" target="_blank" class="block w-full bg-slate-900 hover:bg-black text-white font-bold py-5 rounded-2xl shadow-lg transition-all transform hover:scale-[1.01]">
                פתח ב-Google Sheets
            </a>
        </div>
    </div>

    <script>
        // כתובת הסקריפט החדשה שלך
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyd9kxyQ89CSkzSO3DT0kjYUegvpGRjKD-pAkkSe3_r_J4FiEl2A5uf7QXnWOQE-FknXQ/exec';

        const form = document.getElementById('dataForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const resultArea = document.getElementById('resultArea');
        const sheetLink = document.getElementById('sheetLink');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const tickersRaw = document.getElementById('tickers').value;
            const tickersArray = tickersRaw.split(',').map(s => s.trim()).filter(s => s.length > 0);
            
            const payload = {
                tickers: tickersArray,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            // Loading state
            submitBtn.disabled = true;
            submitBtn.classList.add('loading-shimmer');
            btnText.innerText = "מעבד נתונים (Yahoo -> Google Fallback)...";
            resultArea.classList.add('hidden');

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const resData = await response.json();

                if (resData.status === "success") {
                    sheetLink.href = resData.sheetUrl;
                    resultArea.classList.remove('hidden');
                    resultArea.scrollIntoView({ behavior: 'smooth' });
                } else {
                    throw new Error(resData.message || "שגיאה לא ידועה");
                }

            } catch (error) {
                console.error(error);
                alert("חלה שגיאה: " + error.message + "\nוודא שהגדרת בסקריפט גישה ל-Anyone.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading-shimmer');
                btnText.innerText = "אחזר ומזג נתונים";
            }
        });
    </script>
</body>
</html>
