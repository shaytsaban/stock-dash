<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מייצא נתונים פיננסיים - Yahoo Finance to Google Sheets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="text-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full glass-effect rounded-2xl shadow-2xl overflow-hidden border border-slate-200">
        
        <div class="bg-slate-900 p-8 text-white text-center relative">
            <div class="absolute top-0 right-0 p-2 opacity-10">
                <svg width="100" height="100" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6h-6z"/></svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">Yahoo Finance Exporter</h1>
            <p class="text-slate-400 text-sm mt-2 uppercase tracking-widest">Data Merging & Automation Tool</p>
        </div>

        <form id="exportForm" class="p-8 space-y-6">
            
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">סימולי מניות (מופרדים בפסיק)</label>
                <input type="text" id="tickers" placeholder="TSLA, AAPL, AMZN, MSFT" required
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all placeholder:text-slate-300 shadow-sm">
                <p class="text-xs text-slate-400 mt-1">הזן טיקרים בדיוק כפי שהם מופיעים ב-Yahoo Finance.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">תאריך התחלה</label>
                    <input type="date" id="startDate" required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-600 outline-none shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">תאריך סיום</label>
                    <input type="date" id="endDate" required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-600 outline-none shadow-sm">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">תדירות נתונים</label>
                <select id="frequency" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-600 outline-none bg-white shadow-sm cursor-pointer">
                    <option value="1d">יומי (Daily)</option>
                    <option value="1wk">שבועי (Weekly)</option>
                    <option value="1mo">חודשי (Monthly)</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-lg transform transition active:scale-[0.98] flex items-center justify-center group">
                <span id="btnText">בצע מיזוג וצור גיליון</span>
                <svg id="btnIcon" class="mr-2 h-5 w-5 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                </svg>
            </button>
        </form>

        <div id="resultArea" class="hidden p-8 border-t border-slate-100 bg-blue-50 text-center">
            <div class="flex items-center justify-center mb-4 text-blue-800 font-semibold">
                <svg class="h-6 w-6 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                הפעולה הושלמה בהצלחה!
            </div>
            <a id="sheetLink" href="#" target="_blank" class="inline-flex items-center justify-center w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-md transition-all">
                פתח גיליון Google Sheets חדש
            </a>
            <p class="text-[10px] text-slate-400 mt-4">הגיליון מוגדר כעת עם הרשאות צפייה לכל מי שמחזיק בקישור.</p>
        </div>
    </div>

    <script>
        // כתובת הסקריפט המעודכנת שלך
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw9yk_NdvR-nGH_HDG2SWl5vK6R769u0ddxAGiF-2AA/dev';

        const form = document.getElementById('exportForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const resultArea = document.getElementById('resultArea');
        const sheetLink = document.getElementById('sheetLink');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // איסוף נתונים
            const tickersRaw = document.getElementById('tickers').value;
            const tickersArray = tickersRaw.split(',').map(s => s.trim()).filter(s => s.length > 0);
            
            const payload = {
                tickers: tickersArray,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            // מצב טעינה
            submitBtn.disabled = true;
            btnText.innerText = "מעבד נתונים בשרת...";
            resultArea.classList.add('hidden');

            try {
                // שליחה ל-Google Apps Script
                // הערה: שימוש ב-fetch מול Apps Script דורש טיפול ב-Redirects
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const resData = await response.json();

                if (resData.status === "success") {
                    sheetLink.href = resData.sheetUrl;
                    resultArea.classList.remove('hidden');
                    // גלילה חלקה לתוצאה
                    resultArea.scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("שגיאה מהשרת: " + (resData.message || "לא ידוע"));
                }

            } catch (error) {
                console.error("Error:", error);
                alert("חלה שגיאה בתקשורת. וודא שביצעת Deploy לסקריפט ושהרשאות הגישה מוגדרות ל-'Anyone'.");
            } finally {
                submitBtn.disabled = false;
                btnText.innerText = "בצע מיזוג וצור גיליון";
            }
        });
    </script>
</body>
</html>
