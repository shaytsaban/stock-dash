<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מייצא נתונים פיננסיים - Yahoo Finance to Google Sheets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="text-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full glass-effect rounded-3xl overflow-hidden border border-white">
        
        <div class="bg-slate-900 p-10 text-white text-center relative">
            <div class="absolute top-0 right-0 p-4 opacity-5">
                <svg width="120" height="120" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6h-6z"/></svg>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight">Financial Data Exporter</h1>
            <p class="text-blue-400 text-xs mt-2 uppercase tracking-[0.2em] font-semibold">Yahoo Finance Automation</p>
        </div>

        <form id="exportForm" class="p-8 space-y-6">
            
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">סימולי מניות (מופרדים בפסיק)</label>
                <input type="text" id="tickers" placeholder="למשל: TSLA, AAPL, NVDA" required
                    class="w-full px-4 py-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all placeholder:text-slate-300 bg-slate-50/50">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">תאריך התחלה</label>
                    <input type="date" id="startDate" required
                        class="w-full px-4 py-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none bg-slate-50/50">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">תאריך סיום</label>
                    <input type="date" id="endDate" required
                        class="w-full px-4 py-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none bg-slate-50/50">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">תדירות נתונים</label>
                <select id="frequency" class="w-full px-4 py-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none bg-slate-50/50 cursor-pointer appearance-none">
                    <option value="1d">יומי (Daily)</option>
                    <option value="1wk">שבועי (Weekly)</option>
                    <option value="1mo">חודשי (Monthly)</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-5 rounded-2xl shadow-xl transform transition hover:-translate-y-1 active:scale-[0.98] flex items-center justify-center group">
                <span id="btnText">מזג נתונים וצור גיליון</span>
                <svg id="btnIcon" class="mr-3 h-6 w-6 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                </svg>
            </button>
        </form>

        <div id="resultArea" class="hidden p-8 border-t border-slate-100 bg-blue-50/50 text-center animate-pulse">
            <div class="flex items-center justify-center mb-4 text-blue-900 font-bold">
                <svg class="h-6 w-6 ml-2 text-green-500" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                </svg>
                הגיליון נוצר בהצלחה!
            </div>
            <a id="sheetLink" href="#" target="_blank" class="inline-flex items-center justify-center w-full bg-green-600 hover:bg-green-700 text-white font-extrabold py-5 rounded-2xl shadow-lg transition-all transform hover:scale-[1.02]">
                פתח את הגיליון (Google Sheets)
            </a>
        </div>
    </div>

    <script>
        // כתובת ה-WEB APP המעודכנת שלך (גרסת ה-EXEC)
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2t_4aC73ZUo18cgF-Tey0I0swSwDgu165J1PSmazeaM9Hn88kIH_tmREF3F4tPivmhQ/exec';

        const form = document.getElementById('exportForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const resultArea = document.getElementById('resultArea');
        const sheetLink = document.getElementById('sheetLink');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // איסוף הנתונים
            const tickersRaw = document.getElementById('tickers').value;
            const tickersArray = tickersRaw.split(',').map(s => s.trim()).filter(s => s.length > 0);
            
            const payload = {
                tickers: tickersArray,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            // חיווי טעינה
            submitBtn.disabled = true;
            btnText.innerText = "מתקשר עם שרתי Yahoo...";
            resultArea.classList.add('hidden');

            try {
                // שליחת הבקשה
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    // שימוש ב-text/plain למניעת שגיאות CORS מול Google Apps Script
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const resData = await response.json();

                if (resData.status === "success" || resData.sheetUrl) {
                    sheetLink.href = resData.sheetUrl;
                    resultArea.classList.remove('hidden');
                    // הסרת האנימציה לאחר טעינה
                    resultArea.classList.remove('animate-pulse');
                    // גלילה אוטומטית לכפתור הירוק
                    resultArea.scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("השרת החזיר שגיאה: " + (resData.message || "שגיאה לא ידועה"));
                }

            } catch (error) {
                console.error("Fetch Error:", error);
                alert("לא ניתן היה להשלים את הפעולה. וודא שהסקריפט מפורסם (Deployed) כ-Web App עם גישה ל-'Anyone'.");
            } finally {
                submitBtn.disabled = false;
                btnText.innerText = "מזג נתונים וצור גיליון";
            }
        });
    </script>
</body>
</html>
