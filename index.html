<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוח בקרה פיננסי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'finance-bg': '#0f172a',
                        'finance-card': '#1e293b',
                        'finance-accent': '#10b981',
                        'finance-hover': '#059669'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-finance-bg min-h-screen flex items-center justify-center p-4 font-sans text-gray-200">

    <div class="w-full max-w-md bg-finance-card p-8 rounded-2xl shadow-2xl border border-gray-700/50">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-finance-accent mb-2">לוח בקרה פיננסי</h1>
            <p class="text-gray-400 text-sm">משוך נתוני מניות היסטוריים ישירות לגיליון שלך</p>
        </div>

        <form id="stockForm" class="space-y-6">
            <div>
                <label for="ticker" class="block text-sm font-medium text-gray-300 mb-2">סימול מניה (Ticker)</label>
                <input type="text" id="ticker" required placeholder="לדוגמה: AAPL" 
                    class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-finance-accent transition-all">
            </div>

            <div>
                <label for="startDate" class="block text-sm font-medium text-gray-300 mb-2">תאריך התחלה</label>
                <input type="date" id="startDate" required 
                    class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white focus:outline-none focus:ring-2 focus:ring-finance-accent transition-all">
            </div>

            <div>
                <label for="endDate" class="block text-sm font-medium text-gray-300 mb-2">תאריך סיום</label>
                <input type="date" id="endDate" required 
                    class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white focus:outline-none focus:ring-2 focus:ring-finance-accent transition-all">
            </div>

            <div class="pt-2">
                <button type="submit" id="submitBtn"
                    class="w-full bg-finance-accent hover:bg-finance-hover text-gray-900 font-bold py-3 px-4 rounded-lg transition duration-300 flex items-center justify-center focus:outline-none focus:ring-4 focus:ring-finance-accent/50 disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg id="spinner" class="animate-spin -mr-1 ml-3 h-5 w-5 text-gray-900 hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="btnText">משוך נתונים לגיליון</span>
                </button>
            </div>
            <div id="statusMessage" class="text-center text-sm mt-4 h-5"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('stockForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const ticker = document.getElementById('ticker').value.trim().toUpperCase();
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            if (new Date(startDate) > new Date(endDate)) {
                showError('תאריך ההתחלה חייב להיות לפני תאריך הסיום!');
                return;
            }

            submitBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.textContent = 'טוען נתונים, אנא המתן...';
            statusMessage.textContent = '';
            statusMessage.className = 'text-center text-sm mt-4 h-5';

            try {
                // הכתובת המעודכנת החדשה שסיפקת
                const response = await fetch('https://script.google.com/macros/s/AKfycbydkXVXyshC1_8IzSKUVgMXXklQId2vlzklQgwOACmQ1z4Sgg0EHLK6ZgPoH6vYjsuk/exec', {
                    method: 'POST',
                    body: JSON.stringify({ ticker, startDate, endDate })
                });

                if (!response.ok) throw new Error('בעיית רשת (CORS / שגיאת שרת)');

                const data = await response.json();

                if (data.status === 'success') {
                    statusMessage.textContent = 'הנתונים נמשכו בהצלחה ועודכנו בגיליון!';
                    statusMessage.classList.add('text-finance-accent');
                } else {
                    throw new Error(data.message || 'שגיאה בשרת');
                }

            } catch (error) {
                showError('שגיאת התחברות לשרת: ' + error.message + ' (ודא שהרשאות ה-Apps Script מוגדרות ל-Anyone)');
                console.error(error);
            } finally {
                submitBtn.disabled = false;
                spinner.classList.add('hidden');
                btnText.textContent = 'משוך נתונים לגיליון';
            }
        });

        function showError(message) {
            statusMessage.textContent = message;
            statusMessage.classList.add('text-red-400');
            submitBtn.disabled = false;
            spinner.classList.add('hidden');
            btnText.textContent = 'משוך נתונים לגיליון';
        }
    </script>
</body>
</html>
